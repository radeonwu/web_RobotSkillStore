<h1>技能生命周期</h1>
<div class="onboarding">
  <p>RSS 将机器人能力转化为可信、可复用的平台资产：<strong>注册 → 验证 → 认证 → 部署</strong>。</p>
  <div class="onboarding-line onboarding-anchor"><div class="onboarding-label"><strong>生命周期</strong></div><div class="rss-lifecycle-bar compact" data-stage="all" data-compact="1"></div></div>
</div>
</section>

<section class="section-plain">
<h2 id="overview">总览</h2>
<div class="grid-2" style="align-items:center;">
<div>
<ul>
<li><strong>注册</strong>：发布技能规格——接口、约束、错误模式。</li>
<li><strong>验证</strong>：提交执行记录（runs），RSS 索引结果与制品。</li>
<li><strong>认证</strong>：治理快照基于证据颁发认证。</li>
<li><strong>部署</strong>：用户复用已认证技能，行为可预测、可审计。</li>
</ul>
</div>
<div>
  <img alt="RSS 技能生命周期总览" class="hero-figure-full" src="../assets/media/rss_skill_lifecycle_overview.png"/>
