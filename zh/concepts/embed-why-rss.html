<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>为什么需要 RSS · RobotSkillStore</title>
  <link rel="stylesheet" href="../../assets/css/style.css?v=6.82"/>
  <style>
    /* Embed mode: remove extra margins and keep content tight */
    html,body{height:auto!important;min-height:0!important;}
    body{margin:0;padding:0;display:inline-block;width:100%;}
    .content{max-width:920px;margin:0 auto;padding:18px 18px 24px;}
    .section{margin-top:6px;padding:8px 0;margin-bottom:4px;}
    .chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--vp-c-bg-alt);border:1px solid var(--vp-c-border);color:var(--vp-c-text-2);}
    .prop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0;}
    .prop-card{background:var(--vp-c-bg-soft);border:1px solid var(--vp-c-border);border-radius:10px;padding:12px 14px;}
    .prop-card--highlight{border-color:rgba(37,99,235,0.4);background:rgba(37,99,235,0.05);}
    .prop-title{font-size:13px;font-weight:700;color:var(--vp-c-text-1);margin-bottom:4px;}
    .prop-body{font-size:13px;color:var(--vp-c-text-2);line-height:1.5;}
  </style>
<script>
(function(){
  function apply(mode){
    var root = document.documentElement;
    if(mode === 'dark') root.setAttribute('data-theme','dark');
    else root.removeAttribute('data-theme');
  }

  try{
    var sp = new URLSearchParams(window.location.search);
    var t = sp.get('theme');
    if(t === 'dark' || t === 'light'){
      apply(t);
    }else{
      try{
        var saved = localStorage.getItem('rss_theme');
        if(saved === 'dark' || saved === 'light') apply(saved);
      }catch(e){}
    }
  }catch(e){}

  window.addEventListener('message', function(ev){
    var d = ev && ev.data;
    if(!d || d.type !== 'rss-theme') return;
    var mode = d.mode || d.theme;
    if(mode === 'dark' || mode === 'light') apply(mode);
  });
})();
</script>

</head>
<body>
  <main class="content">
<section class="section-plain">
<p style="font-size:14px;color:var(--vp-c-text-2);margin:0 0 14px;">没有统一标准，机器人技能将被锁定在特定项目、团队和硬件中。RSS 解决四个核心痛点：</p>
<div class="prop-grid">
  <div class="prop-card">
    <div class="prop-title">缺乏复用性</div>
    <div class="prop-body">没有共享契约，技能无法跨机器人或团队迁移，每次部署都需从头重建。</div>
  </div>
  <div class="prop-card">
    <div class="prop-title">缺乏结构</div>
    <div class="prop-body">安全约束存在于注释和口头传承中，而非可执行的机器可读契约里。</div>
  </div>
  <div class="prop-card">
    <div class="prop-title">缺乏证据</div>
    <div class="prop-body">README 不是保证，认证需要来自真实运行的可量化、可重复的证据。</div>
  </div>
  <div class="prop-card prop-card--highlight">
    <div class="prop-title">RSS 解决这些问题</div>
    <div class="prop-body">技能成为一等资产：有证据支撑、经过认证、可跨组织组合复用。</div>
  </div>
</div>
</section>
  </main>
<script>
(function(){
  function calc(){
    return Math.max(
      document.documentElement.scrollHeight||0,
      document.body ? (document.body.scrollHeight||0) : 0,
      document.body ? (document.body.offsetHeight||0) : 0
    );
  }

  var last = 0;
  function send(){
    var h = calc();
    if(!h) return;
    if(Math.abs(h - last) < 2) return;
    last = h;
    try{ parent.postMessage({type:'rss-embed-height', height:h}, '*'); }catch(e){}
  }

  window.addEventListener('message', function(ev){
    var d = ev.data || {};
    if(d.type === 'rss-embed-ping') send();
  });

  if('ResizeObserver' in window){
    try{ new ResizeObserver(function(){ send(); }).observe(document.documentElement); }catch(e){}
  }
  if('MutationObserver' in window){
    try{ new MutationObserver(function(){ send(); }).observe(document.documentElement, {subtree:true, childList:true, attributes:true, characterData:true}); }catch(e){}
  }

  window.addEventListener('load', function(){
    send();
    setTimeout(send, 100);
    setTimeout(send, 400);
  });

  setInterval(send, 2000);
})();
</script>

</body>
</html>
