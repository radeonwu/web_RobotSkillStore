<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>部署 · 技能生命周期 · RobotSkillStore</title>
  <link rel="stylesheet" href="../../assets/css/style.css?v=6.80"/>
  <style>
    html,body{height:auto!important;min-height:0!important;}
    body{margin:0;padding:0;display:inline-block;width:100%;}
    .content{max-width:920px;margin:0 auto;padding:18px 18px 24px;}
    .section{margin-top:14px;}
    .stage-badge{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;}
    .stage-num{width:28px;height:28px;border-radius:50%;background:var(--rss-c-active,#16a34a);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .stage-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--vp-c-text-2);}
    /* Match Docs page format */
    .section{margin-top:6px;padding:8px 0;margin-bottom:4px;}
    .section h1{display:none;}
    .section h2{font-size:14px;font-weight:700;margin:0 0 6px;letter-spacing:0;}
    .section p{font-size:13px;color:var(--vp-c-text-2);margin:0 0 6px;line-height:1.55;}
    .section ul,.section ol{font-size:13px;color:var(--vp-c-text-2);margin:4px 0 6px 18px;line-height:1.55;}
    .section li{margin:3px 0;}
    .section code{font-size:11px;}
    .section-plain{padding-bottom:4px;}
  </style>
  <script>
  (function(){
    function apply(mode){
      var root=document.documentElement;
      if(mode==='dark') root.setAttribute('data-theme','dark');
      else root.removeAttribute('data-theme');
    }
    try{
      var sp=new URLSearchParams(window.location.search);
      var t=sp.get('theme');
      if(t==='dark'||t==='light'){apply(t);}
      else{try{var s=localStorage.getItem('rss_theme');if(s==='dark'||s==='light')apply(s);}catch(e){}}
    }catch(e){}
    window.addEventListener('message',function(ev){
      var d=ev&&ev.data;
      if(!d||d.type!=='rss-theme')return;
      var m=d.mode||d.theme;
      if(m==='dark'||m==='light')apply(m);
    });
  })();
  </script>
</head>
<body>
<main class="content">

<section class="section-plain">
  <div class="stage-badge">
    <div class="stage-num">4</div>
    <span class="stage-label">第 4 阶段，共 4 阶段 · 生命周期</span>
  </div>
</section>

<section class="section">
  <h2 id="what-happens">发生了什么</h2>
  <ul>
    <li><strong>已认证技能可复用</strong>——行为可复现、可参数化配置，兼容多款机器人配置文件。</li>
    <li><strong>持续治理</strong>——证据低于阈值时自动降级，无需人工监控。</li>
    <li><strong>证据查看器</strong>——用户可在部署前浏览运行记录、检查制品、审阅治理快照。</li>
  </ul>
</section>

<section class="section">
  <h2 id="what-the-platform-does">平台做了什么</h2>
  <ul>
    <li>维护实时治理状态——<code>ACTIVE</code> / <code>DEGRADED</code> / <code>QUARANTINED</code> 由滚动证据窗口自动计算。</li>
    <li>通过 <code>/viewer/</code> 路径在证据查看器中开放运行记录与制品。</li>
    <li>治理更新自动进行——降级在演变为生产事故前即被发现。</li>
  </ul>
</section>

</main>
<script>
(function(){
  function calc(){
    var b=document.body,e=document.documentElement;
    return Math.max(b?b.scrollHeight:0,e?e.scrollHeight:0,b?b.offsetHeight:0,e?e.offsetHeight:0);
  }
  var last=0;
  function send(){
    var h=calc();
    if(!h)return;
    if(Math.abs(h-last)<2)return;
    last=h;
    try{parent.postMessage({type:'rss-embed-height',height:h},'*');}catch(e){}
  }
  window.addEventListener('message',function(ev){var d=ev.data||{};if(d.type==='rss-embed-ping')send();});
  if('ResizeObserver' in window){try{new ResizeObserver(function(){send();}).observe(document.documentElement);}catch(e){}}
  if('MutationObserver' in window){try{new MutationObserver(function(){send();}).observe(document.documentElement,{subtree:true,childList:true,attributes:true,characterData:true});}catch(e){}}
  window.addEventListener('load',function(){send();setTimeout(send,100);setTimeout(send,400);});
  setInterval(send,2000);
})();
</script>
</body>
</html>
